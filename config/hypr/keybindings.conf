# See https://wiki.hypr.land/Configuring/Binds/ for more

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, discord
bind = $mainMod, F, exec, $browser
bind = $mainMod, O, exec, obsidian --ozone-platform=x11
bind = $mainMod, L, exit,
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
bind = $mainMod, N, exec, dunstctl history-pop
bind = $mainMod, T, exec, /home/lynx/.local/bin/theme-selector
bind = $mainMod, Z, exec, zen
bind = $mainMod, M, exec, firefoxpwa site launch 01KNFQN1BYK6D6QDJVHGTKD03D #Zen Browser
bind = $mainMod, C, exec, firefoxpwa site launch 01KNG5WQEF02YKPSNM2G6WQW6P #ChatGPT
bind = $mainMod, W, exec, firefoxpwa site launch 01KP1C2XF2WHQQ8YZ2E6JNZDFC #Whatsapp

# Windows
bind = $mainMod, Q, killactive,
bind = $mainMod, F11, fullscreen
bind = $mainMod, X, togglefloating
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit # dwindle
bind = $mainMod, R, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Alt+Tab window switcher
bind = ALT, Tab, exec, rofi -show window -show-icons

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, togglespecialworkspace, magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, /home/lynx/.local/bin/screenshot

# Audio
bindel = , XF86AudioRaiseVolume, exec, /home/lynx/.local/bin/volume up
bindel = , XF86AudioLowerVolume, exec, /home/lynx/.local/bin/volume down
bindl = , XF86AudioMute, exec, /home/lynx/.local/bin/volume mute
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, /home/lynx/.local/bin/brightness up
bindel = , XF86MonBrightnessDown, exec, /home/lynx/.local/bin/brightness down

# Brightness via wl-gammarelay-rs (software gamma dim)
bindel = $mainMod, XF86AudioRaiseVolume, exec, /home/lynx/.local/bin/brightness up
bindel = $mainMod, XF86AudioLowerVolume, exec, /home/lynx/.local/bin/brightness down

# Media (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
