# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

windowrule {
    # Ignore maximize requests from all apps
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Steam - popups flotantes
windowrule = float on, match:class ^(steam)$, match:title ^(Friends List|Settings)$

# Steam - fix para popups vacíos que roban foco
windowrule = stay_focused on, match:title ^()$, match:class ^(steam)$
windowrule = size 1 1, match:title ^()$, match:class ^(steam)$

# Electron apps - fix darker opacity on NVIDIA/Wayland
windowrule {
    name = fix-electron-opacity-obsidian
    match:class = ^(obsidian)$
}

# Zen Browser - transparencia con blur
windowrule = opacity 1.0 0.98, match:class ^(zen.*)$

# Juegos - fullscreen y tearing (reduce input lag)
windowrule = fullscreen on, match:class ^(gamescope)$
windowrule = immediate on, match:class ^(steam_app_.*)$

# gsimplecal - popup below waybar so it doesn't cover the clock
windowrule {
    name = position-gsimplecal
    match:class = ^([Gg]simplecal)$

    float = yes
    move = 60 55
}

# Rofi powermenu - normal-window mode (so click-away dismiss works)
windowrule {
    name = position-rofi-powermenu
    match:class = ^(Rofi)$

    float = yes
    move = 10 0
}

# JetBrains IDEs - workspace assignment
# exec "[workspace N]" only catches the first forked process (splash/bootstrap),
# not the main IDE window. Persistent rules fix this.
windowrule {
    name = webstorm-workspace
    match:class = ^(jetbrains-webstorm)$
    workspace = 2 silent
}

windowrule {
    name = rider-workspace
    match:class = ^(jetbrains-rider)$
    workspace = 3 silent
}
